<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Пожелание на день</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Кастомные стили для донастройки -->
    <style>
        /* Дополнительные стили, которых нет в Tailwind */
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }
        /* Контейнер точно как на iPhone 15 Pro (393x852) */
        .phone-frame {
            width: 393px;
            height: 852px;
            position: relative;
            overflow: hidden;
            border-radius: 44px;
            background: black;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }
        /* Анимация для счётчиков при клике */
        .counter-click {
            transform: scale(1.05);
            transition: transform 0.1s ease;
        }
        /* Стили для скролла, если контент не влезает (но у нас всё влезает) */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
</head>
<body class="bg-black">
    <div class="phone-frame">
        <!-- Фоновое изображение (если у вас есть rectangle11.png – положите рядом, иначе фон останется чёрным) -->
        <!-- <img class="absolute top-0 left-0 w-full h-full object-cover" src="rectangle11.png" alt=""> -->
        
        <!-- Размытый оверлей -->
        <div class="absolute top-0 left-0 w-full h-full backdrop-blur-[10px] backdrop-brightness-100 bg-gradient-to-b from-[rgba(18,18,18,0)] via-[rgba(18,18,18,0)] to-[rgba(18,18,18,0.16)]"></div>
        
        <!-- Заголовок -->
        <header class="absolute top-[61px] left-[35px]">
            <h1 class="font-semibold text-white text-3xl tracking-[-2.1px]">Пожелание на день</h1>
        </header>
        
        <!-- Декоративные полупрозрачные блоки (можно оставить, они добавляют стиль) -->
        <div class="absolute top-[118px] left-[8px] w-[250px] h-[529px] bg-white/10"></div>
        <div class="absolute top-[139px] left-[233px] w-[240px] h-[584px] bg-white/30"></div>
        
        <!-- Основное пожелание дня -->
        <div class="absolute top-[220px] left-[35px] right-[35px]">
            <div class="text-white text-[28px] font-bold text-center leading-tight" id="dailyWish">
                Загрузка...
            </div>
        </div>
        
        <!-- Блок "В этот день мы:" и дополнительная картинка -->
        <div class="absolute top-[778px] left-[35px] text-white/50 text-[15px] tracking-[-1.05px] font-medium">
            В этот день мы:
        </div>
        <div class="absolute top-[789px] left-[220px] w-[141px] h-[158px] bg-white/10 rounded-2xl"></div>
        <h2 class="absolute top-[829px] left-[35px] w-[104px] font-semibold text-white text-[17px] tracking-[-1.19px]">
            Пожелание
        </h2>
        
        <!-- Дата -->
        <time class="absolute top-[917px] left-[35px] text-white text-[15px] tracking-[-1.05px]" id="currentDate">
            21 мая 2026
        </time>
        
        <!-- Счётчики (интерактивные) -->
        <div class="absolute bottom-[50px] left-0 right-0 flex justify-around px-[35px]">
            <!-- Поцелуи -->
            <div class="text-center cursor-pointer" id="kissesCounter">
                <div class="text-white text-[10px] tracking-[-0.7px] font-normal" id="kissesValue">0</div>
                <div class="text-white text-[15px] tracking-[-1.05px] font-normal mt-1">Поцелуи</div>
            </div>
            <!-- Обнимашки -->
            <div class="text-center cursor-pointer" id="hugsCounter">
                <div class="text-white text-[10px] tracking-[-0.7px] font-normal" id="hugsValue">0</div>
                <div class="text-white text-[15px] tracking-[-1.05px] font-normal mt-1">Обнимашки</div>
            </div>
            <!-- Комплименты -->
            <div class="text-center cursor-pointer" id="complimentsCounter">
                <div class="text-white text-[10px] tracking-[-0.7px] font-normal" id="complimentsValue">0</div>
                <div class="text-white text-[15px] tracking-[-1.05px] font-normal mt-1">Комплименты</div>
            </div>
        </div>
    </div>

    <script>
        // ------------------- Ежедневное пожелание -------------------
        // Здесь ваши пожелания (ключ – день года, 1 = 1 января)
        const wishes = {
            1: "❤️ С первой годовщины! Ты лучший! ❤️",
            2: "☀️ Пусть сегодняшний день будет ярким, как твоя улыбка!",
            3: "😊 Просто хочу сказать, что очень тебя люблю!",
            // Добавляйте свои пожелания на каждый день (до 365)
        };
        
        function getDayOfYear() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 86400000;
            return Math.floor(diff / oneDay);
        }
        
        const dayNum = getDayOfYear();
        const defaultWish = "Я тебя очень сильно люблю! 💖";
        const wishText = wishes[dayNum] || defaultWish;
        document.getElementById('dailyWish').innerText = wishText;
        
        // ------------------- Текущая дата -------------------
        const now = new Date();
        const months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 
                        'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
        const dateString = `${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        document.getElementById('currentDate').innerText = dateString;
        
        // ------------------- Счётчики с сохранением в localStorage -------------------
        // Получаем сохранённые значения или устанавливаем 0
        let kisses = localStorage.getItem('kisses') ? parseInt(localStorage.getItem('kisses')) : 0;
        let hugs = localStorage.getItem('hugs') ? parseInt(localStorage.getItem('hugs')) : 0;
        let compliments = localStorage.getItem('compliments') ? parseInt(localStorage.getItem('compliments')) : 0;
        
        // Функция обновления чисел на экране
        function updateCountersUI() {
            document.getElementById('kissesValue').innerText = kisses;
            document.getElementById('hugsValue').innerText = hugs;
            document.getElementById('complimentsValue').innerText = compliments;
        }
        
        // Функция увеличения счётчика и сохранения
        function incrementCounter(counterName) {
            let newValue;
            if (counterName === 'kisses') {
                kisses++;
                newValue = kisses;
                localStorage.setItem('kisses', kisses);
            } else if (counterName === 'hugs') {
                hugs++;
                newValue = hugs;
                localStorage.setItem('hugs', hugs);
            } else if (counterName === 'compliments') {
                compliments++;
                newValue = compliments;
                localStorage.setItem('compliments', compliments);
            }
            updateCountersUI();
            
            // Небольшая анимация при клике
            const element = document.getElementById(`${counterName}Counter`);
            element.classList.add('counter-click');
            setTimeout(() => {
                element.classList.remove('counter-click');
            }, 100);
        }
        
        // Навешиваем обработчики на клики
        document.getElementById('kissesCounter').addEventListener('click', () => incrementCounter('kisses'));
        document.getElementById('hugsCounter').addEventListener('click', () => incrementCounter('hugs'));
        document.getElementById('complimentsCounter').addEventListener('click', () => incrementCounter('compliments'));
        
        // Первоначальное отображение
        updateCountersUI();
    </script>
</body>
</html>
